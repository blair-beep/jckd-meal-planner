<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCKD Meal Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Chivo+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#e8e8e8;font-family:'Chivo Mono',monospace;font-size:13px;text-transform:uppercase;letter-spacing:.03em;padding:24px 16px}
.wrap{max-width:900px;margin:0 auto}
.header{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.logo{font-family:'Anton',sans-serif;font-size:28px;color:#dce125}
.card{background:#1a1a1a;border:.5px solid #2e2e2e;border-radius:10px;padding:20px;margin-bottom:16px}
.sec{font-family:'Anton',sans-serif;font-size:18px;color:#dce125;margin-bottom:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.lbl{font-size:11px;color:#888;margin-bottom:6px}
input[type=text],input[type=number],textarea{width:100%;background:#111;border:.5px solid #333;border-radius:6px;padding:10px 12px;color:#e8e8e8;font-family:'Chivo Mono',monospace;font-size:13px;text-transform:uppercase;outline:none}
input:focus,textarea:focus{border-color:#dce125}
textarea{min-height:80px;resize:vertical}
.btn{background:#dce125;color:#0f0f0f;border:none;border-radius:6px;padding:14px;font-family:'Anton',sans-serif;font-size:18px;cursor:pointer;width:100%}
.btn:hover{opacity:.88}
.tabs{display:flex;gap:4px;margin-bottom:20px}
.tab{background:transparent;border:.5px solid #333;color:#555;border-radius:6px;padding:8px 16px;font-family:'Chivo Mono',monospace;font-size:11px;cursor:pointer;text-transform:uppercase}
.tab.on{border-color:#dce125;color:#dce125;background:#dce12512}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.sc{background:#1a1a1a;border:.5px solid #2e2e2e;border-radius:8px;padding:12px;text-align:center}
.sv{font-family:'Anton',sans-serif;font-size:22px;color:#dce125}
.sk{font-size:10px;color:#555;margin-top:2px}
.day{background:#1a1a1a;border:.5px solid #2e2e2e;border-radius:10px;margin-bottom:10px;overflow:hidden}
.dh{background:#111;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:.5px solid #2e2e2e}
.dn{font-family:'Anton',sans-serif;font-size:15px;color:#dce125}
.dm{font-size:11px;color:#555}
.db{padding:14px 16px;display:none}
.db.open{display:block}
.bl{font-size:11px;color:#666;margin-bottom:5px}
.bt{background:#111;border-radius:4px;height:7px;margin-bottom:12px;overflow:hidden}
.bf{height:7px;border-radius:4px;background:#dce125}
.bf.hi{background:#e84545}
.meal{border-bottom:.5px solid #2e2e2e;padding:10px 0}
.meal:last-child{border:none}
.mn{font-size:13px;color:#e8e8e8;margin-bottom:3px}
.mm{font-size:11px;color:#555;margin-bottom:7px}
.rb{font-size:10px;color:#dce125;background:none;border:none;cursor:pointer;font-family:'Chivo Mono',monospace;text-transform:uppercase;padding:0}
.rc{background:#111;border-radius:6px;padding:10px;margin-top:7px;font-size:11px;line-height:1.9;color:#999;display:none}
.rc.open{display:block}
.rc ol{padding-left:16px}
.rc ol li{margin-bottom:4px}
.si{padding:6px 0;border-bottom:.5px solid #222;font-size:12px;color:#bbb;display:flex;align-items:center;gap:8px}
.si::before{content:'';width:7px;height:7px;border:.5px solid #dce125;border-radius:2px;flex-shrink:0}
.sc2{columns:2;gap:14px}
.err{background:#200;border:.5px solid #e84545;border-radius:8px;padding:14px;color:#e84545;font-size:12px;margin-bottom:14px}
#loading{display:none;text-align:center;padding:48px}
.spin{width:30px;height:30px;border:2px solid #222;border-top-color:#dce125;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}
.lm{font-family:'Anton',sans-serif;font-size:18px;color:#dce125}
#out{display:none}
.tog-wrap{display:flex;gap:8px;margin-bottom:6px}
.tog-btn{background:transparent;border:.5px solid #333;color:#555;border-radius:6px;padding:8px 24px;font-family:'Chivo Mono',monospace;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em}
.tog-btn.on{border-color:#dce125;color:#dce125;background:#dce12512}
.otg-note{font-size:10px;color:#555;margin-top:6px;display:none}
@media(max-width:580px){.g3,.g2,.sg{grid-template-columns:1fr 1fr}.sc2{columns:1}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <svg width="32" height="36" viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M48 4 L72 4 Q76 4 74 8 L44 48 L62 48 Q68 48 64 54 L22 96 Q18 100 16 96 L30 58 L12 58 Q6 58 10 52 Z" fill="#dce125"/>
    </svg>
    <div class="logo">JCKD MEAL PLANNER</div>
  </div>

  <div id="form" class="card">
    <div class="sec">YOUR TARGETS</div>
    <div id="err" class="err" style="display:none"></div>
    <div class="g3">
      <div><div class="lbl">DAILY CALORIES</div><input id="cal" type="number" placeholder="E.G. 2200"></div>
      <div><div class="lbl">PROTEIN (G)</div><input id="pro" type="number" placeholder="E.G. 180"></div>
      <div><div class="lbl">MEALS PER DAY</div><input id="mls" type="number" placeholder="E.G. 4" min="1" max="6"></div>
    </div>
    <div class="g2">
      <div><div class="lbl">DIETARY PREFERENCE</div><input id="diet" type="text" placeholder="E.G. NO PORK"></div>
      <div><div class="lbl">INGREDIENTS YOU ALREADY HAVE</div><input id="ing" type="text" placeholder="E.G. CHICKEN, RICE, EGGS..."></div>
    </div>
    <div style="margin-bottom:16px">
      <div class="lbl">INCLUDE ON-THE-GO MEALS?</div>
      <div class="tog-wrap">
        <button id="btn-no" class="tog-btn on" onclick="setOtg(false)">NO</button>
        <button id="btn-yes" class="tog-btn" onclick="setOtg(true)">YES</button>
      </div>
      <div id="otg-note" class="otg-note">SOME MEALS WILL BE SOURCED FROM PRET, LEON, ITSU, STARBUCKS, M&S FOOD, TESCO, SAINSBURYS ETC.</div>
    </div>
    <button class="btn" onclick="go()">GENERATE MY PLAN</button>
  </div>

  <div id="loading">
    <div class="spin"></div>
    <div class="lm" id="lmsg">BUILDING YOUR MEAL PLAN...</div>
  </div>

  <div id="out">
    <div class="sg" id="stats"></div>
    <div class="tabs">
      <button class="tab on" onclick="switchTab('meals',this)">MEAL PLAN</button>
      <button class="tab" onclick="switchTab('shop',this)">SHOPPING LIST</button>
    </div>
    <div id="meals"></div>
    <div id="shop" style="display:none"></div>
    <button class="btn" style="margin-top:8px" onclick="reset()">START OVER</button>
  </div>
</div>

<script>
var LM = ["BUILDING YOUR MEAL PLAN...", "CALCULATING YOUR MACROS...", "WRITING YOUR RECIPES...", "ALMOST THERE..."];
var li = 0, lv, otgOn = false;

function setOtg(val) {
  otgOn = val;
  document.getElementById('btn-yes').classList.toggle('on', val);
  document.getElementById('btn-no').classList.toggle('on', !val);
  document.getElementById('otg-note').style.display = val ? 'block' : 'none';
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('on'); });
  btn.classList.add('on');
  document.getElementById('meals').style.display = id === 'meals' ? 'block' : 'none';
  document.getElementById('shop').style.display = id === 'shop' ? 'block' : 'none';
}

function reset() {
  document.getElementById('out').style.display = 'none';
  document.getElementById('form').style.display = 'block';
}

function toggleDay(id) { document.getElementById(id).classList.toggle('open'); }

function toggleRec(btn, id) {
  var el = document.getElementById(id);
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? 'HIDE RECIPE' : 'VIEW RECIPE';
}

function buildPrompt(cal, pro, mls, diet, ing) {
  var minPro = Math.round(parseInt(pro) / parseInt(mls));
  var otgSection = otgOn
    ? 'ON-THE-GO OPTION: Mix in 1-2 meals that can be bought ready-made from UK high street chains such as Pret a Manger, Leon, Itsu, Starbucks, Costa, M&S Food, Tesco, Sainsburys, Boots, or Subway. Use real menu items with accurate calorie and protein counts. Examples: Pret Chicken and Greens Protein Bowl 380 kcal 30g protein, Leon Grilled Chicken Salad Box 350 kcal 35g protein, Itsu Chicken Teriyaki Rice Bowl 420 kcal 30g protein, Tesco Chicken Protein Pot 300 kcal 35g protein. For on-the-go meals set recipe field to the chain name only e.g. "Available at Pret a Manger" and exclude those items from the shopping list.'
    : 'All meals must be home-cooked. Do not include any on-the-go or restaurant meals.';
  var dietLine = diet ? 'Dietary restrictions: ' + diet : '';
  var ingLine = ing ? 'Ingredients already at home (use where possible, exclude from shopping list): ' + ing : '';

  return 'You are a nutrition coach. Generate a 1-day meal plan.\n'
    + 'Daily calorie target: ' + cal + ' kcal. Daily protein target: ' + pro + 'g. Meals per day: ' + mls + '.\n'
    + (dietLine ? dietLine + '\n' : '')
    + (ingLine ? ingLine + '\n' : '')
    + 'Food style: a balanced mix of calorie-dense and volume foods. Use lean proteins, complex carbs, moderate healthy fats, and a good portion of vegetables in each meal. Meals should be satisfying and filling without being excessive.\n'
    + otgSection + '\n\n'
    + 'JCKD RECIPE LIBRARY - All recipes below have already been scaled to 1 portion. Use these exact ingredient quantities. Macros shown are per 1 portion.\n\n'
    + 'BREAKFASTS:\n'
    + 'Bonanza Pancakes (1 portion): 63ml oat milk, 1 egg separated, 50g rolled oats, half small banana, 1g baking powder, vanilla extract, cooking spray. Blend oat milk/yolk/banana/oats/baking powder/vanilla. Fold in stiff egg white. Cook in lightly sprayed pan. Serve with low-fat yoghurt and fruit. 350 kcal, 15g protein.\n'
    + 'Delicious Banana and Peanut Butter Pots (1 portion): 50g porridge oats, 0.3 tsp cinnamon, one third of a medium banana chopped, 83g fortified soya yoghurt, 13g crunchy peanut butter. Simmer oats in water, stir in banana, cool, layer with peanut butter yoghurt. 356 kcal, 13g protein.\n'
    + 'Tasty Smoothie Bowl (1 portion): 200g frozen mixed berries, 1 banana, 75ml oat milk, 5ml maple syrup, 8g vanilla protein powder. Toppings: kiwi, fresh berries, 25g granola, 15g mixed nuts and seeds, 15g almond butter. Blend base until thick, top and serve. 230 kcal, 9g protein.\n'
    + 'Pepper Tomato and Ham Omelette (1 portion): 1 whole egg and 2 egg whites, 3ml olive oil, half red pepper chopped, 1 spring onion, 30g wafer-thin extra-lean ham shredded, 13g reduced-fat cheddar, 1 chopped tomato. Cook pepper in oil, pour in eggs, top with ham and cheese, grill until set. 206 kcal, 21g protein.\n'
    + 'Sweet Overnight Oats (1 portion): 50g rolled oats, 1g ground cinnamon, 100ml milk or water, 30g natural yoghurt, 50g mixed berries, 7g honey, 8g nut butter. Soak oats overnight, top with yoghurt, berries, honey and nut butter. 348 kcal, 13g protein.\n'
    + 'Breakfast Bagel Club (1 portion): 25g cream cheese, 1 bagel halved and toasted, 50g smoked salmon, half avocado sliced, squeeze of lemon, 5ml olive oil, 1 egg, pinch cayenne pepper. Assemble with cream cheese, salmon, avocado, top with fried egg. 681 kcal, 33g protein.\n'
    + 'Vegan Breakfast Muffin (1 portion): 13g muesli mix, 4g brown sugar, 13g plain flour, 1g baking powder, 21ml sweetened soy milk, small amount grated apple, 5ml grapeseed oil, 8g almond butter, 4g demerara sugar, 4g pecans. Bake at 200C for 25-30 mins. 224 kcal, 4g protein.\n'
    + 'One Pan Breakfast (1 portion): 1 pork chipolata, 1 rasher smoked back bacon, 35g button mushrooms, 2 eggs beaten, 2 cherry tomatoes halved, 10g grated cheese, pinch of chives. Fry sausage and bacon, add mushrooms, pour in eggs, top with tomatoes and cheese, grill until set. 349 kcal, 25g protein.\n'
    + 'Smashed Avocado on Toast (1 portion): 1 ripe avocado, squeeze of half lemon, pinch chilli flakes, 2 slices sourdough toasted, 5ml extra virgin olive oil. Optional: 1 poached egg adds 93 kcal and 8g protein. 500 kcal, 10g protein.\n'
    + 'Banana and Vanilla Smoothie (1 portion): half banana, 5g porridge oats, 40g soft fruit, 75ml milk, 3g honey, 3ml vanilla extract. Blend all together. 156 kcal, 4g protein.\n'
    + 'Overnight Chia Porridge (1 portion): 25g rolled oats, 15g chia seeds, 1g ground cinnamon, 250ml almond milk. Soak overnight, cook until creamy, top with 15g raspberry jam swirled through 30g yoghurt, fresh raspberries, 10g sliced almonds, 5ml maple syrup. 437 kcal, 10g protein.\n'
    + 'Berry Nice Smoothie (1 portion): 113g frozen berries, 113g fat-free strawberry yoghurt, 25ml milk, 6g porridge oats, optional drizzle honey. Blend all together. 117 kcal, 8g protein.\n'
    + 'Simple Protein Pancakes (1 portion): half banana, 38g oats, 2 large eggs, 15ml milk, 5g baking powder, pinch cinnamon, 15g protein powder, 5ml coconut oil for frying. Blend all, cook in batches. Serve with 15g nut butter and fruit. 437 kcal, 31g protein.\n'
    + 'Mexican Breakfast Plate (1 portion): 8ml olive oil, quarter onion, half garlic clove, 100g kidney beans drained, 3g cumin, 1g chilli powder, 1g oregano, 1 egg, 1 small flour tortilla, quarter large tomato, pickled jalapenos, 8g cheddar, quarter avocado, squeeze lime, coriander. Cook beans, fry egg, assemble on tortilla. 540 kcal, 21g protein.\n'
    + 'Protein Power Balls (1 portion / 1 ball): 10g porridge oats, 3g protein powder, 1g ground flaxseeds, pinch cinnamon, 1g vanilla extract, 3ml maple syrup, 10g peanut butter, 4ml plant milk, 2g chocolate chips. Mix and roll, chill 30 mins. 130 kcal, 4g protein. Note: suggest 2-3 balls as a snack.\n\n'
    + 'LUNCHES:\n'
    + 'The Spiced Chicken Wrap (1 portion): 90g raw chicken breast sliced, 1g mild chilli powder, half garlic clove, 3ml olive oil, 1 seeded wrap, squeeze of half lime, quarter avocado, half roasted red pepper from jar, fresh coriander. Fry spiced chicken, assemble in wrap with avocado. 403 kcal, 29g protein.\n'
    + 'The Mega Nutrition Soup (1 portion): 3ml rapeseed oil, quarter onion, quarter garlic clove, 100g broccoli florets, 75g frozen peas, 50g chard, 250ml veg stock, fresh basil, fresh dill, quarter lemon, 5g pumpkin seeds toasted. Simmer 25 mins, blend smooth. 214 kcal, 12g protein.\n'
    + 'The Tuna Pasta Lunch Box (1 portion): 63g wholemeal penne dry, 60g bio yoghurt, 3g English mustard powder, 8ml extra virgin olive oil, 5ml apple cider vinegar, quarter red onion, fresh basil, 80g tuna in spring water drained, half red pepper, 85g sweetcorn drained. Mix dressing with tuna and veg, toss with cold cooked pasta. 444 kcal, 25g protein.\n'
    + 'Vegan Curry and Chickpea Jacket (1 portion): 1 medium sweet potato, 8ml coconut oil, 3g cumin seeds, quarter large onion, half garlic clove, small piece ginger, quarter green chilli, 3g garam masala, 3g ground coriander, 1g turmeric, 15ml tikka masala paste, 200g chopped tomatoes, 200g chickpeas drained, squeeze lemon, fresh coriander. Roast potato, make curry, spoon over. 276 kcal, 12g protein.\n'
    + 'Caesar Pitta (1 portion): 5ml lemon juice, quarter small garlic clove, 15g fat-free Greek yoghurt, 15g lighter mayonnaise, 1g mustard powder, 1 brown anchovy finely chopped, 8g grated parmesan, 80g cooked chicken shredded, quarter small cucumber cubed, 3 cherry tomatoes halved, 4 Little Gem lettuce leaves, 1 wholemeal pitta. Whisk dressing, toss with chicken and salad, stuff in toasted pitta. 461 kcal, 40g protein.\n'
    + 'Spiced Carrot and Lentil Soup (1 portion): 3g cumin seeds, pinch chilli flakes, 8ml olive oil, 150g carrots grated, 35g split red lentils, 250ml hot veg stock, 31ml milk. Toast spices, add veg and lentils, simmer 15 mins, blend. Serve with plain yoghurt. 238 kcal, 11g protein.\n'
    + 'The Lean Salmon Pasta Bowl (1 portion): 88g penne dry, 175g raw salmon steak, 8ml olive oil, 8g pine nuts, quarter red pepper, 75g mushrooms sliced, fresh basil. Cook salmon in pasta water, saute veg, combine. 543 kcal, 31g protein.\n'
    + 'Nutty Chicken Satay Strips (1 portion): 15g chunky peanut butter, half garlic clove grated, 3g Madras curry powder, 5ml soy sauce, 10ml lime juice, 150g raw chicken breast strips, cucumber fingers, sweet chilli sauce. Coat chicken in peanut mixture, bake 8-10 mins at 200C. 276 kcal, 41g protein.\n'
    + 'Winter Veg Soup (1 portion): 43g red lentils, 1 carrot diced, 2 sticks celery sliced, 1 small leek sliced, 15ml tomato puree, fresh thyme, 2 garlic cloves, 5g veg bouillon powder, 3g ground coriander. Simmer in 750ml boiling water 30 mins. 264 kcal, 16g protein.\n'
    + 'Turkey Chilli Jacket Potato (1 portion): 1 large baking potato, 3ml olive oil, quarter onion, half garlic clove, 75g raw turkey mince, 8g smoked paprika, 8ml cider vinegar, 8g soft brown sugar, 88ml passata, reduced-fat red leicester to serve, 1 spring onion. Bake potato, cook turkey chilli, serve on top. 410 kcal, 30g protein.\n'
    + 'Tortilla Pizza (1 portion): 30ml passata, half garlic clove, 4ml olive oil, 1g dried herbs, 1 plain tortilla, 25g mozzarella grated, 3-4 slices pepperoni, 3-4 pickled jalapeno slices. Spread sauce on tortilla, top and bake 6-8 mins at 220C. 266 kcal, 11g protein.\n'
    + 'Pesto Pasta Salad (1 portion): 67g mini pasta shapes dry, 33ml creme fraiche, 10ml fresh pesto, small amount cucumber cubed, 3 cherry tomatoes halved, 33g frozen peas cooked, fresh basil. Cook pasta, mix with creme fraiche and pesto, cool, add veg. 420 kcal, 11g protein.\n'
    + 'The Mighty Open Sandwich (1 portion): 2 eggs, 1 ripe avocado, juice of 1 lime, 2 slices rye bread, 10ml sriracha, handful cress. Hard boil eggs, mash avocado on rye, top with sliced eggs, sriracha and cress. 476 kcal, 19g protein.\n'
    + 'Spanish Soup (1 portion): 200g chopped tomatoes, 55g chorizo chunks, 70g Savoy cabbage shredded, pinch chilli flakes, 200g chickpeas drained, half stock cube. Simmer all together 6 mins. 366 kcal, 23g protein.\n'
    + 'Microwave Veg Curry (1 portion): 8ml coconut oil, quarter onion finely chopped, 5g ginger paste, 5g garlic paste, 15ml tomato puree, 3g turmeric, 10g garam masala, 3g cumin, 3g ground coriander, 200g chopped tomatoes, 25g spinach, 200g chickpeas drained, 50ml coconut milk, fresh coriander, 5ml lime juice. Microwave in stages 6-8 mins. 374 kcal, 14g protein.\n\n'
    + 'DINNERS:\n'
    + 'Easy Vegan Singapore Noodles (1 portion): 50g vermicelli rice noodles, 3g mild curry powder, 1g turmeric, 3g caster sugar, 8ml sesame oil, 20ml soy sauce, 8ml sunflower oil, quarter onion sliced, quarter pepper sliced, 50g beansprouts. Soak noodles, stir fry veg, add noodles and sauce. 288 kcal, 7g protein.\n'
    + 'Extra Tasty Salmon Burgers (1 portion): 138g raw salmon fillet, 15ml Thai red curry paste, small piece ginger grated, 5ml soy sauce, fresh coriander, 3ml vegetable oil, half carrot peeled into strips, quarter cucumber peeled into strips, 15ml white wine vinegar, 3g caster sugar. Blend salmon mixture, shape into burger, fry 4-5 mins each side. Serve with slaw. 292 kcal, 29g protein.\n'
    + 'The Mediterranean Evening (1 portion): quarter onion sliced, quarter red pepper and quarter green pepper sliced, 13g chorizo sliced, half garlic clove, 8ml olive oil, 63g basmati rice dry, 100g chopped tomatoes, 50g raw peeled prawns. Fry chorizo and veg, add rice and tomatoes with 125ml water, cook 12 mins, add prawns for final minute. 356 kcal, 19g protein.\n'
    + 'The One Pot Roast Dinner (1 portion): 375g whole chicken portion, quarter lemon, 13g softened butter, 3g dried mixed herbs, 188g potatoes chopped, 125g carrots chopped, 15ml olive oil, 25g frozen peas, 75ml chicken stock, 3g Marmite. Roast at 200C for 80 mins, add peas and stock for final 10 mins. 845 kcal, 55g protein. NOTE: this meal is 845 kcal - only use if the daily target allows and it is the only large meal of the day.\n'
    + 'Turkey Burger and Chips (1 portion): 95g raw sweet potato cut into wedges, 130g raw turkey breast mince 5% fat, quarter red onion diced, 1 garlic clove grated, half egg beaten, 35g apple peeled and grated, 5g dried oregano, 5g paprika, 8g coconut oil, 68g green vegetables. Shape mince into burger, bake 20-25 mins at 180C. Fry sweet potato wedges in coconut oil. 428 kcal, 40g protein.\n'
    + 'The Simple Seafood Rice (1 portion): 8ml olive oil, quarter leek sliced, 28g chorizo chopped, 3g turmeric, 75g long grain rice dry, 250ml fish or chicken stock, 50g frozen peas, 100g frozen seafood mix defrosted. Fry leek and chorizo, add rice and stock, simmer 15 mins, add peas and seafood. 518 kcal, 32g protein.\n'
    + 'Veggie Enchiladas (1 portion): 3ml olive oil, half onion chopped, 70g carrots grated, 3g chilli powder, 200g chopped tomatoes, 200g mixed pulses drained, 2 small wholemeal tortillas, 50g low-fat natural yoghurt, 13g extra-mature cheddar grated. Make bean chilli, fill tortillas, top with yoghurt and cheese, grill until golden. 430 kcal, 23g protein.\n'
    + 'Healthy Choc Brownies (1 portion / 1 brownie): 50g black beans drained, 4g cocoa powder, 1g instant coffee granules, 13g xylitol, 3ml vanilla extract, quarter egg, 13g fat-free Greek yoghurt, 1g baking powder. Blend all, bake at 190C for 25-30 mins, cut into 16. 121 kcal, 6g protein. Suggest 2 brownies as an evening snack.\n'
    + 'Cheeky Chinese Chicken Curry (1 portion): 1 chicken breast 150g raw, 5g cornflour, quarter onion diced, 15ml rapeseed oil, half garlic clove, 5g curry powder, 3g turmeric, 1g ground ginger, pinch sugar, 100ml chicken stock, 5ml soy sauce, handful frozen peas. Fry seasoned chicken, blend onion sauce, combine and simmer. Serve with 60g dry basmati rice cooked. 264 kcal, 40g protein.\n'
    + 'Caponata Pasta (1 portion): 175g penne dry, 100ml olive oil, half large onion, 2 garlic cloves, 125g chargrilled Mediterranean veg, 200g chopped tomatoes, 8g capers, 15g raisins, fresh basil, parmesan to serve. Caramelise onion, add veg and sauce, toss with cooked pasta. 542 kcal, 14g protein.\n'
    + 'Chicken Roasted With Root Veg (1 portion): small piece celeriac 100g, 100g swede, half large sweet potato, half parsnip, half garlic clove, 15ml olive oil, 1g cumin seeds, sage leaves, 140g raw chicken breast wrapped in 1 slice prosciutto. Roast veg 30 mins at 200C, add wrapped chicken, roast further 30-35 mins. 420 kcal, 43g protein.\n'
    + 'Easy Prawn Stir Fry (1 portion): 125g mixed vegetables, 8ml rapeseed oil, half garlic clove, small piece ginger, 11ml soy sauce, 15ml sweet chilli sauce, 50g cooked prawns, 50g egg noodles dry. Stir fry veg with garlic and ginger, add sauce and prawns, serve over cooked noodles. 193 kcal, 14g protein.\n'
    + 'Peppered Steak With Noodles (1 portion): 113g skirt steak, 8ml soy sauce, 30ml shaohsing wine, 1 garlic clove, small piece ginger, 15ml vegetable oil, 15g cornflour, 8ml sesame oil, quarter onion, quarter red and quarter yellow pepper, pinch sesame seeds, 3g crushed black peppercorns, 125g cooked noodles. Sear steak, stir fry veg with sauce, combine. 479 kcal, 36g protein.\n'
    + 'Fish Tacos (1 portion): 125g raw white fish fillet, 3g cumin, 3g ground coriander, 5g smoked paprika, half lime, quarter red cabbage sliced, half tomato, half avocado, 2 small corn tortillas, fresh coriander, 25g soured cream, chilli sauce. Grill spiced fish, assemble tacos. 665 kcal, 33g protein.\n'
    + 'Chicken Tagine (1 portion): 2 boneless chicken thighs, 15ml olive oil, quarter onion, 3g fresh ginger grated, pinch saffron or turmeric, 8g honey, 100g carrots cut into sticks, fresh parsley, lemon wedge. Simmer covered 30 mins in 38ml water. 304 kcal, 39g protein.\n\n'
    + 'MEAL STRUCTURE: Structure meals based on the number of meals per day as follows. 3 meals: Breakfast, Lunch, Dinner. 4 meals: Breakfast, Lunch, Dinner, and 1 Snack (either a mid-afternoon snack or an evening sweet treat). 5 meals: Breakfast, Lunch, Dinner, and 2 Snacks (one daytime snack and one evening sweet treat). Label each meal clearly with its type e.g. "BREAKFAST - Protein Oats" or "SNACK - Greek Yoghurt with Berries".\n\n'
    + 'MEAL CAP: No single meal should exceed 750 kcal. If a recipe from the JCKD library would exceed this when scaled to hit targets, reduce the portion size and add a side instead.\n\n'
    + 'SERVING SIZE: Always state the serving size clearly in the recipe. E.g. "Serves 1" or "Serves 2 - this is 1 portion". If using a JCKD library recipe that serves multiple portions, state how many portions the full recipe makes and confirm the macros are for 1 portion only.\n\n'
    + 'INGREDIENT REFERENCE TABLE - use these exact values per 100g/100ml unless stated:\n'
    + 'Chicken breast (raw): 110 kcal, 23g protein per 100g\n'
    + 'Turkey mince 5% fat (raw): 120 kcal, 22g protein per 100g\n'

}

function go() {
  var cal = document.getElementById('cal').value;
  var pro = document.getElementById('pro').value;
  var mls = document.getElementById('mls').value;
  var diet = document.getElementById('diet').value;
  var ing = document.getElementById('ing').value;
  var err = document.getElementById('err');

  err.style.display = 'none';
  if (!cal || !pro || !mls) {
    err.textContent = 'PLEASE FILL IN CALORIES, PROTEIN AND MEALS PER DAY.';
    err.style.display = 'block';
    return;
  }

  document.getElementById('form').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  li = 0;
  document.getElementById('lmsg').textContent = LM[0];
  lv = setInterval(function() {
    li = (li + 1) % LM.length;
    document.getElementById('lmsg').textContent = LM[li];
  }, 2200);

  var prompt = buildPrompt(cal, pro, mls, diet, ing);

  fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 6000, messages: [{ role: 'user', content: prompt }] })
  }).then(function(r) {
    clearInterval(lv);
    if (!r.ok) { return r.text().then(function(t) { throw new Error('API error ' + r.status + ': ' + t); }); }
    return r.json();
  }).then(function(d) {
    var txt = (d.content || []).reduce(function(a, b) { return a + (b.type === 'text' ? b.text : ''); }, '');
    var plan = JSON.parse(txt.replace(/```json|```/g, '').trim());
    render(plan, parseInt(cal), parseInt(pro));
  }).catch(function(e) {
    clearInterval(lv);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form').style.display = 'block';
    err.textContent = 'ERROR: ' + e.message;
    err.style.display = 'block';
  });
}

function render(p, cal, pro) {
  document.getElementById('loading').style.display = 'none';
  var avgCal = Math.round(p.weeklyAvgCalories), avgPro = Math.round(p.weeklyAvgProtein);
  document.getElementById('stats').innerHTML =
    '<div class="sc"><div class="sv">' + cal + '</div><div class="sk">CAL TARGET</div></div>' +
    '<div class="sc"><div class="sv">' + pro + 'G</div><div class="sk">PROTEIN TARGET</div></div>' +
    '<div class="sc"><div class="sv" style="color:' + (Math.abs(avgCal - cal) <= 150 ? '#dce125' : '#e84545') + '">' + avgCal + '</div><div class="sk">TOTAL CALS</div></div>' +
    '<div class="sc"><div class="sv" style="color:' + (Math.abs(avgPro - pro) <= 15 ? '#dce125' : '#e84545') + '">' + avgPro + 'G</div><div class="sk">TOTAL PROTEIN</div></div>';

  var html = '';
  p.days.forEach(function(d, di) {
    var cp = Math.min(100, Math.round(d.totalCalories / cal * 100));
    var pp = Math.min(100, Math.round(d.totalProtein / pro * 100));
    var cOver = d.totalCalories > cal * 1.1, pOver = d.totalProtein > pro * 1.1;
    var mealsHtml = '';
    d.meals.forEach(function(m, mi) {
      var rid = 'r' + di + '_' + mi;
      var recipeHtml = m.recipe.replace(/(\d+)\.\s+/g, function(match, n) { return n === '1' ? '<ol><li>' : '</li><li>'; }) + '</li></ol>';
      mealsHtml += '<div class="meal">'
        + '<div class="mn">' + m.name + '</div>'
        + '<div class="mm">' + m.calories + ' KCAL / ' + m.protein + 'G PROTEIN</div>'
        + '<button class="rb" onclick="toggleRec(this,\'' + rid + '\')">VIEW RECIPE</button>'
        + '<div class="rc" id="' + rid + '">' + recipeHtml + '</div>'
        + '</div>';
    });
    html += '<div class="day">'
      + '<div class="dh" onclick="toggleDay(\'db' + di + '\')">'
      + '<span class="dn">' + d.day + '</span>'
      + '<span class="dm">' + d.totalCalories + ' KCAL / ' + d.totalProtein + 'G PROTEIN</span>'
      + '</div>'
      + '<div class="db open" id="db' + di + '">'
      + '<div class="bl">CALORIES: ' + d.totalCalories + ' / ' + cal + '</div>'
      + '<div class="bt"><div class="bf' + (cOver ? ' hi' : '') + '" style="width:' + cp + '%"></div></div>'
      + '<div class="bl">PROTEIN: ' + d.totalProtein + 'G / ' + pro + 'G</div>'
      + '<div class="bt"><div class="bf' + (pOver ? ' hi' : '') + '" style="width:' + pp + '%"></div></div>'
      + mealsHtml
      + '</div></div>';
  });
  document.getElementById('meals').innerHTML = html;

  var shopHtml = '<div class="card"><div class="sec">SHOPPING LIST</div><div class="sc2">';
  p.shoppingList.forEach(function(item) { shopHtml += '<div class="si">' + item + '</div>'; });
  shopHtml += '</div></div>';
  document.getElementById('shop').innerHTML = shopHtml;
  document.getElementById('out').style.display = 'block';
}
</script>
